
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G.A.P.S. by HALO · Dual Voice Companion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(145deg, #0a1628 0%, #1a2a4a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 16px;
    }
    .app-container {
      max-width: 480px;
      width: 100%;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(212,168,67,0.3);
      border-radius: 32px;
      padding: 20px 16px 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,168,67,0.1) inset;
    } 

    /* Header */
    .halo-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .halo-mark {
      font-size: 28px;
      filter: drop-shadow(0 0 6px #d4a843);
    }
    .app-title {
      color: #d4a843;
      font-weight: 400;
      letter-spacing: 3px;
      font-size: 20px;
    }
    .app-title span {
      font-weight: 300;
      color: #b0c4de;
    } 

    /* Dual Avatar Row */
    .dual-avatar-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 8px;
      padding: 0 8px;
    }
    .avatar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .avatar-circle {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #1e3a5f;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 8px 12px rgba(0,0,0,0.3);
    }
    .worker-avatar .avatar-circle {
      border-color: #4a90e2;
      background: linear-gradient(145deg, #1e3a5f, #0f2440);
    }
    .client-avatar .avatar-circle {
      border-color: #d4a843;
      background: linear-gradient(145deg, #2a4a3a, #0f2a1f);
    }
    .avatar-label {
      color: #ccddee;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .gap-indicator {
      font-size: 28px;
      color: #d4a843;
      opacity: 0.7;
      margin-bottom: 20px;
    } 

    /* Chat area */
    .conversation-panel {
      background: rgba(10, 20, 40, 0.7);
      border-radius: 24px;
      padding: 20px 16px;
      margin: 16px 0 18px;
      border: 1px solid #2c4a6e;
      min-height: 200px;
      backdrop-filter: blur(4px);
    }
    .message {
      display: flex;
      margin-bottom: 20px;
      animation: fadeIn 0.2s ease;
    }
    .message.worker {
      justify-content: flex-start;
    }
    .message.client {
      justify-content: flex-end;
    }
    .bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 24px;
      font-size: 16px;
      line-height: 1.45;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      word-break: break-word;
    }
    .worker .bubble {
      background: #1e3a5f;
      border-bottom-left-radius: 6px;
      border: 1px solid #4a90e2;
      color: #f0f6ff;
    }
    .client .bubble {
      background: #1e3a2a;
      border-bottom-right-radius: 6px;
      border: 1px solid #d4a843;
      color: #f5f0e0;
    } 

    /* PAWS context bar */
    .paws-context {
      background: #0f1a2b;
      border-radius: 30px;
      padding: 8px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-left: 4px solid #d4a843;
    }
    .paws-stage {
      color: #d4a843;
      font-weight: 600;
    }
    .paws-days {
      color: #aac8e8;
      font-size: 14px;
    } 

    /* Action buttons */
    .action-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 8px;
    }
    .btn {
      background: #1e3a5f;
      border: 1px solid #4a90e2;
      color: white;
      padding: 14px 20px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
      transition: all 0.15s;
      backdrop-filter: blur(5px);
      text-align: center;
      box-shadow: 0 6px 0 #0a1628;
    }
    .btn-client {
      background: #1e3a2a;
      border-color: #d4a843;
      box-shadow: 0 6px 0 #0f2a1f;
    }
    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0a1628;
    }
    .btn:disabled {
      opacity: 0.4;
      transform: none;
      box-shadow: 0 6px 0 #0a1628;
      pointer-events: none;
    }
    .reset-btn {
      background: transparent;
      border: 1px solid #6ba5a5;
      color: #c0d0e0;
      box-shadow: none;
      margin-top: 16px;
      padding: 10px;
      font-size: 14px;
    } 

    /* Voice indicator */
    .listening-indicator {
      text-align: center;
      margin: 8px 0 4px;
      color: #d4a843;
      font-size: 14px;
      min-height: 24px;
    } 

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    } 

    /* HALT quick check */
    .halt-strip {
      display: flex;
      justify-content: space-around;
      margin: 16px 0 8px;
    }
    .halt-item {
      background: #132237;
      padding: 6px 12px;
      border-radius: 30px;
      color: #bbd1f0;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="halo-header">
    <span class="halo-mark">✨</span>
    <div class="app-title">G.A.P.S.<span> by HALO</span></div>
    <span class="halo-mark">✨</span>
  </div> 

  <!-- Dual Avatar with Gap -->
  <div class="dual-avatar-row">
    <div class="avatar worker-avatar">
      <div class="avatar-circle">🧑‍⚕️</div>
      <div class="avatar-label">Worker</div>
    </div>
    <div class="gap-indicator">⚡</div>
    <div class="avatar client-avatar">
      <div class="avatar-circle">🧘</div>
      <div class="avatar-label">Client</div>
    </div>
  </div> 

  <!-- PAWS timeline snippet -->
  <div class="paws-context">
    <span class="paws-stage">🧠 PAWS Emergence</span>
    <span class="paws-days">Day 47 · Hurdles: Sleep, Lability</span>
  </div> 

  <!-- HALT quick check (visual) -->
  <div class="halt-strip">
    <span class="halt-item">😋 Hungry 4</span>
    <span class="halt-item">😤 Angry 3</span>
    <span class="halt-item">😔 Lonely 7</span>
    <span class="halt-item">😴 Tired 6</span>
  </div> 

  <!-- Conversation display -->
  <div class="conversation-panel" id="conversationPanel">
    <!-- Messages will appear here -->
  </div> 

  <!-- Listening indicator -->
  <div class="listening-indicator" id="listeningStatus"></div> 

  <!-- Main action buttons -->
  <div class="action-bar">
    <button class="btn" id="workerBtn">🗣️ Worker</button>
    <button class="btn btn-client" id="clientBtn">🧘 Client</button>
  </div>
  <div class="action-bar" style="margin-top: 8px;">
    <button class="btn" id="voiceBtn" style="background:#2c4a6e;">🎤 Speak Response</button>
  </div>
  <button class="btn reset-btn" id="resetBtn">⟲ Restart Conversation</button>
  <p style="color:#6ba5a5; font-size:12px; text-align:center; margin-top:16px;">
    Mind Your G.A.P.S. · Gratitude · Acceptance · Presence · Surrender
  </p>
</div> 

<script>
  (function(){
    "use strict"; 

    // ---------- CONVERSATION TREE (simplified PAWS/CENAPS flow) ----------
    const conversationSteps = [
      { speaker: 'worker', text: "Welcome back. You're at Day 47—PAWS Emergence. How are you feeling today?" },
      { speaker: 'client', text: "I don't know. Tired. My head won't shut up. And I'm lonely." },
      { speaker: 'worker', text: "That's exactly where we'd expect. Your HALT shows Lonely at 7, Tired at 6. Let's start there. Have you done your HALT check-in today?" },
      { speaker: 'client', text: "Not really. I forgot." },
      { speaker: 'worker', text: "No judgment. Let's do a quick one now. Hungry? Hurt? Angry? Lonely? Tired?" },
      { speaker: 'client', text: "Lonely. And tired. That's it." },
      { speaker: 'worker', text: "Thank you for naming it. Lonely means oxytocin is low. Tired means your brain is doing repair work. Which Block feels closest right now?" },
      { speaker: 'client', text: "Maybe Block 2—The Mask. I tell everyone I'm fine, but I'm not." },
      { speaker: 'worker', text: "That's huge awareness. The Mask is early emotional relapse. Let's use the Fish Bowl: 'There's loneliness. I am not loneliness.' Can you try that?" },
      { speaker: 'client', text: "There's loneliness. I am not loneliness." },
      { speaker: 'worker', text: "Beautiful. Now, for sleep—same wind-down tonight? No screens, journal one line?" },
      { speaker: 'client', text: "I'll try. One line." },
      { speaker: 'worker', text: "That's all I ask. I'll check in tomorrow. You've got this." },
      { speaker: 'client', text: "Thanks. I needed to hear that." }
    ]; 

    let currentStep = 0;                  // index in conversationSteps
    let waitingForVoice = false;
    let voicesLoaded = false;
    let synth = window.speechSynthesis;
    let recognition = null;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; 

    // DOM elements
    const panel = document.getElementById('conversationPanel');
    const workerBtn = document.getElementById('workerBtn');
    const clientBtn = document.getElementById('clientBtn');
    const voiceBtn = document.getElementById('voiceBtn');
    const resetBtn = document.getElementById('resetBtn');
    const listeningStatus = document.getElementById('listeningStatus'); 

    // Helper: Add message bubble to panel
    function addMessage(speaker, text) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${speaker}`;
      msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
      panel.appendChild(msgDiv);
      panel.scrollTop = panel.scrollHeight;
    } 

    // Clear panel and reset step
    function resetConversation() {
      panel.innerHTML = '';
      currentStep = 0;
      waitingForVoice = false;
      listeningStatus.textContent = '';
      // Add initial messages up to current step? we'll rebuild on next action
      // But for now, just add first worker message automatically
      const first = conversationSteps[0];
      if (first) {
        addMessage(first.speaker, first.text);
        speakText(first.text, first.speaker);
      }
      // disable buttons? no need
    } 

    // Speak text with a voice appropriate to speaker
    function speakText(text, speaker) {
      if (!synth) return;
      synth.cancel(); // stop any ongoing speech
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      utterance.pitch = speaker === 'worker' ? 1.0 : 1.1;
      utterance.volume = 1;
      
      // Try to pick a voice: for worker, prefer deeper; for client, neutral
      if (voicesLoaded) {
        const voices = synth.getVoices();
        if (voices.length) {
          if (speaker === 'worker') {
            const pref = voices.find(v => v.name.includes('Google UK') || v.name.includes('Daniel') || v.name.includes('Male')) || voices[0];
            utterance.voice = pref;
          } else {
            const pref = voices.find(v => v.name.includes('Samantha') || v.name.includes('Google US') || v.name.includes('Female')) || voices[0];
            utterance.voice = pref;
          }
        }
      }
      synth.speak(utterance);
    } 

    // Load voices
    function loadVoices() {
      return new Promise((resolve) => {
        let voices = synth.getVoices();
        if (voices.length) {
          voicesLoaded = true;
          resolve();
        } else {
          synth.onvoiceschanged = () => {
            voicesLoaded = true;
            resolve();
          };
        }
      });
    } 

    // Advance conversation by one step (worker or client)
    function advanceConversation(triggerSpeaker) {
      if (currentStep >= conversationSteps.length - 1) {
        // End of conversation
        addMessage('worker', "We've covered the key steps. This is where the app would continue with personalized tools. Great job.");
        speakText("We've covered the key steps. This is where the app would continue with personalized tools. Great job.", 'worker');
        workerBtn.disabled = true;
        clientBtn.disabled = true;
        voiceBtn.disabled = true;
        return;
      } 

      // Move to next step
      currentStep++;
      const next = conversationSteps[currentStep];
      
      // If triggerSpeaker doesn't match expected speaker, we still show the correct one (the tree is fixed)
      // But we can allow flexible triggering: worker button triggers next worker line if it's worker's turn,
      // but if it's client's turn and user hits worker? we ignore. better to respect turn.
      const expected = next.speaker;
      
      // Show the message
      addMessage(expected, next.text);
      speakText(next.text, expected);
      
      // Enable/disable based on next turn? we don't disable, just let user click whichever, but we could guide.
      // We'll keep both enabled, but if they click out of turn, we just do nothing? Let's enforce turn order gently.
    } 

    // Handle manual button clicks (worker / client)
    function handleWorkerClick() {
      if (waitingForVoice) return;
      const current = conversationSteps[currentStep];
      // If it's worker's turn to speak next? Actually currentStep is the last displayed.
      // The next step is currentStep+1. Let's check the next step's speaker.
      if (currentStep < conversationSteps.length - 1) {
        const next = conversationSteps[currentStep + 1];
        if (next.speaker === 'worker') {
          advanceConversation('worker');
        } else {
          // Not worker's turn, but we can still show a gentle hint
          listeningStatus.textContent = "It's the client's turn to share.";
          setTimeout(() => listeningStatus.textContent = '', 1800);
        }
      } else {
        // end
      }
    } 

    function handleClientClick() {
      if (waitingForVoice) return;
      if (currentStep < conversationSteps.length - 1) {
        const next = conversationSteps[currentStep + 1];
        if (next.speaker === 'client') {
          advanceConversation('client');
        } else {
          listeningStatus.textContent = "Let the worker guide next.";
          setTimeout(() => listeningStatus.textContent = '', 1800);
        }
      }
    } 

    // Voice recognition: capture client response
    function startVoiceRecognition() {
      if (!SpeechRecognition) {
        alert("Speech recognition not supported in this browser. Use Chrome/Edge.");
        return;
      }
      if (waitingForVoice) return;
      
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      
      recognition.onstart = () => {
        waitingForVoice = true;
        listeningStatus.textContent = "🎙️ Listening... speak your response";
        workerBtn.disabled = true;
        clientBtn.disabled = true;
        voiceBtn.disabled = true;
      };
      
      recognition.onerror = (event) => {
        console.warn('Recog error', event);
        listeningStatus.textContent = "Voice error, try again.";
        resetVoiceState();
      };
      
      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        listeningStatus.textContent = `Heard: "${transcript}"`;
        
        // Add client message with the actual spoken words
        addMessage('client', transcript);
        speakText(transcript, 'client');

        // Skip past any scripted client lines to find the next worker response
        setTimeout(() => {
          // Advance past scripted client line(s) to find next worker line
          while (
            currentStep < conversationSteps.length - 1 &&
            conversationSteps[currentStep + 1].speaker === 'client'
          ) {
            currentStep++; // silently skip scripted client lines
          }
          // Now advance to the next worker line
          if (currentStep < conversationSteps.length - 1) {
            advanceConversation('worker');
          }
          resetVoiceState();
        }, 900);
      };
      
      recognition.onend = () => {
        if (waitingForVoice) {
          // if no result, reset
          resetVoiceState();
        }
      };
      
      recognition.start();
    }
    
    function resetVoiceState() {
      waitingForVoice = false;
      workerBtn.disabled = false;
      clientBtn.disabled = false;
      voiceBtn.disabled = false;
      if (!listeningStatus.textContent.includes('Heard')) {
        listeningStatus.textContent = '';
      }
    } 

    // Initialize
    async function init() {
      await loadVoices();
      resetConversation(); // starts with first worker message
      
      workerBtn.addEventListener('click', handleWorkerClick);
      clientBtn.addEventListener('click', handleClientClick);
      voiceBtn.addEventListener('click', startVoiceRecognition);
      resetBtn.addEventListener('click', () => {
        synth.cancel();
        resetConversation();
        workerBtn.disabled = false;
        clientBtn.disabled = false;
        voiceBtn.disabled = false;
        waitingForVoice = false;
        listeningStatus.textContent = '';
      });
      
      // Prepopulate a welcome if needed (reset does it)
    } 

    init();
  })();
</script>
</body>
</html>
